<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Star Location 8 Nonogram</title>
  <desc id="desc">A 5 by 5 nonogram puzzle with clues 1 4 4 4 1 and 1 3 5 3 1 1.</desc>

  <rect width="512" height="512" fill="#d9d9d9" />

  <!-- Header backgrounds -->
  <rect x="0" y="0" width="160" height="160" fill="#d0d0d0" />
  <rect x="160" y="0" width="352" height="160" fill="#cfcfcf" />
  <rect x="0" y="160" width="160" height="352" fill="#cfcfcf" />

  <!-- Header striping -->
  <rect x="224" y="0" width="64" height="160" fill="#d8d8d8" />
  <rect x="352" y="0" width="64" height="160" fill="#d8d8d8" />
  <rect x="0" y="224" width="160" height="64" fill="#d8d8d8" />
  <rect x="0" y="352" width="160" height="64" fill="#d8d8d8" />

  <!-- Puzzle area -->
  <rect x="160" y="160" width="352" height="352" fill="#f2f2f2" />

  <!-- Grid lines in puzzle area -->
  <g stroke="#9a9a9a" stroke-width="1">
    <line x1="160" y1="230.4" x2="512" y2="230.4" />
    <line x1="160" y1="300.8" x2="512" y2="300.8" />
    <line x1="160" y1="371.2" x2="512" y2="371.2" />
    <line x1="160" y1="441.6" x2="512" y2="441.6" />

    <line x1="230.4" y1="160" x2="230.4" y2="512" />
    <line x1="300.8" y1="160" x2="300.8" y2="512" />
    <line x1="371.2" y1="160" x2="371.2" y2="512" />
    <line x1="441.6" y1="160" x2="441.6" y2="512" />
  </g>

  <!-- Main axis lines -->
  <line x1="160" y1="0" x2="160" y2="512" stroke="#1f1f1f" stroke-width="2" />
  <line x1="0" y1="160" x2="512" y2="160" stroke="#1f1f1f" stroke-width="2" />

  <!-- Column clues -->
  <g font-family="Segoe UI, Arial, sans-serif" font-size="44" fill="#111" text-anchor="middle">
    <text x="195.2" y="138">1</text>
    <text x="265.6" y="138">4</text>
    <text x="336" y="138">4</text>
    <text x="406.4" y="138">4</text>
    <text x="476.8" y="138">1</text>
  </g>

  <!-- Row clues -->
  <g font-family="Segoe UI, Arial, sans-serif" font-size="44" fill="#111" text-anchor="middle">
    <text x="122" y="205.6">1</text>
    <text x="122" y="276">3</text>
    <text x="122" y="346.4">5</text>
    <text x="122" y="416.8">3</text>
    <text x="92" y="487.2">1</text>
    <text x="125" y="487.2">1</text>
  </g>
</svg>
